name: Deploy second brain to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'second-brain/**'
      - '.github/workflows/deploy-second-brain.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: second-brain
    steps:
      - uses: actions/checkout@v4
      # enablement: true switches Pages on automatically on first run
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: second-brain/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: second-brain/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
